<!DOCTYPE html>
<html lang="zh-CN" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LLM Value Rankings · Apple</title>
    <meta name="description" content="Apple 风格大模型性价比排行榜 — OpenRouter 价格与能力评分。">
    <meta name="theme-color" content="#000000">
    <meta name="app-version" content="20250709apple">
    <script>
        (function () {
            try {
                var style = localStorage.getItem('ui-style');
                if (style && style !== 'apple') {
                    if (style === 'eva') { location.replace('eva.html'); return; }
                    if (style === 'spacex') { location.replace('spacex.html'); return; }
                    if (style === 'editorial') { location.replace('minimal.html'); return; }
                    if (style === 'classic') {
                        location.replace('index.html');
                        return;
                    }
                }
                try { localStorage.setItem('ui-style', 'apple'); } catch (e) {}
                var theme = localStorage.getItem('theme');
                if (theme === 'light' || theme === 'dark') {
                    document.documentElement.setAttribute('data-theme', theme);
                }
            } catch (e) {}
        })();
    </script>
    <link rel="stylesheet" href="css/apple.css?v=20250709apple">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='8' fill='%23000'/><circle cx='16' cy='16' r='6' fill='none' stroke='%232997ff' stroke-width='2'/></svg>">
</head>
<body>
    <header class="apl-header">
        <div class="apl-header-inner">
            <a class="apl-logo" href="apple.html">
                <span class="apl-logo-mark"></span>
                <span class="apl-logo-text">LLM Value Rankings</span>
            </a>
            <div class="apl-header-actions">
                <a class="apl-ghost" id="github-star" href="https://github.com/yyh-001/llm-value-rankings" target="_blank" rel="noopener">
                    ★ <span id="star-count">—</span>
                </a>
                <div class="apl-style-switcher">
                    <label class="apl-style-label" for="style-select" data-i18n="style_label">风格</label>
                    <select id="style-select" class="apl-select" aria-label="Switch visual style">
                        <option value="classic" data-i18n="style_classic">经典</option>
                        <option value="spacex" data-i18n="style_spacex">SpaceX</option>
                        <option value="editorial" data-i18n="style_editorial">极简</option>
                        <option value="apple" data-i18n="style_apple" selected>Apple</option>
                        <option value="eva" data-i18n="style_eva">EVA</option>
                    </select>
                </div>
                <button type="button" class="apl-icon-btn" id="theme-toggle" title="Toggle theme" aria-label="Toggle theme">
                    <svg class="icon-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" aria-hidden="true">
                        <circle cx="12" cy="12" r="4"/>
                        <path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41"/>
                    </svg>
                    <svg class="icon-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" aria-hidden="true">
                        <path d="M21 14.5A8.5 8.5 0 1 1 9.5 3a7 7 0 0 0 11.5 11.5z"/>
                    </svg>
                </button>
                <button type="button" class="apl-icon-btn" id="lang-toggle" aria-label="Switch language">
                    <span id="lang-label">EN</span>
                </button>
            </div>
        </div>
    </header>

    <main class="apl-main">
        <section class="apl-hero">
            <p class="apl-eyebrow" data-i18n="eyebrow">Daily rankings</p>
            <h1 class="apl-title" data-i18n="title">大模型性价比</h1>
            <p class="apl-desc" data-i18n="subtitle">能力 × 速度^0.8 / 价格 · OpenRouter</p>

            <div class="apl-metrics">
                <div class="apl-metric">
                    <span class="apl-metric-value" id="total-models">—</span>
                    <span class="apl-metric-label" data-i18n="stat_total">模型</span>
                </div>
                <div class="apl-metric">
                    <span class="apl-metric-value" id="ranked-models">—</span>
                    <span class="apl-metric-label" data-i18n="stat_ranked">已排名</span>
                </div>
                <div class="apl-metric">
                    <span class="apl-metric-value" id="avg-intelligence">—</span>
                    <span class="apl-metric-label" data-i18n="stat_avg">能力均分</span>
                </div>
                <div class="apl-metric">
                    <span class="apl-metric-value" id="last-updated">—</span>
                    <span class="apl-metric-label" data-i18n="stat_updated">更新</span>
                </div>
            </div>
        </section>

        <section class="apl-top" id="podium-section" hidden>
            <div class="apl-section-label" data-i18n="top3">Top 3</div>
            <div class="apl-podium" id="podium"></div>
        </section>

        <section class="apl-board">
            <div class="apl-board-bar">
                <div class="apl-section-label" id="results-count">—</div>
                <div class="apl-controls">
                    <input type="search" id="search-input" class="apl-input" data-i18n-placeholder="search_ph" placeholder="搜索模型…" autocomplete="off">
                    <select id="sort-select" class="apl-select">
                        <option value="value" data-i18n="sort_value">性价比</option>
                        <option value="intelligence" data-i18n="sort_intel">能力</option>
                        <option value="speed" data-i18n="sort_speed">速度</option>
                        <option value="price" data-i18n="sort_price">价格</option>
                    </select>
                </div>
            </div>

            <div class="apl-table-wrap">
                <table class="apl-table">
                    <thead>
                        <tr>
                            <th data-i18n="col_rank">#</th>
                            <th data-i18n="col_model">模型</th>
                            <th data-i18n="col_intel">能力</th>
                            <th data-i18n="col_speed">速度</th>
                            <th data-i18n="col_price">价格</th>
                            <th data-i18n="col_value">性价比</th>
                        </tr>
                    </thead>
                    <tbody id="rankings-body">
                        <tr><td colspan="6" class="apl-empty" data-i18n="loading">加载中…</td></tr>
                    </tbody>
                </table>
            </div>
            <div class="apl-cards" id="rankings-cards"></div>
            <div class="apl-pager" id="pagination"></div>
        </section>
    </main>

    <footer class="apl-footer">
        <div class="apl-footer-main">
            <span data-i18n="footer">OpenRouter · Artificial Analysis</span>
            <a href="https://github.com/yyh-001/llm-value-rankings" target="_blank" rel="noopener">GitHub</a>
        </div>
        <p class="apl-footer-stats">
            <span class="apl-footer-stat">
                <span data-i18n="footer_site_pv">总访问量</span>
                <span class="apl-footer-stat-value" id="vercount_value_site_pv">—</span>
            </span>
            <span class="apl-footer-sep" aria-hidden="true">·</span>
            <span class="apl-footer-stat">
                <span data-i18n="footer_site_uv">访客数</span>
                <span class="apl-footer-stat-value" id="vercount_value_site_uv">—</span>
            </span>
        </p>
    </footer>

    <div class="apl-modal hidden" id="detail-modal" role="dialog" aria-modal="true" aria-labelledby="modal-title">
        <div class="apl-modal-backdrop" id="modal-backdrop"></div>
        <div class="apl-modal-panel">
            <button type="button" class="apl-modal-close" id="modal-close" aria-label="Close">×</button>
            <div id="modal-body"></div>
        </div>
    </div>

    <script defer src="https://events.vercount.one/js"></script>
    <script src="js/apple.js?v=20250709apple"></script>
</body>
</html>
