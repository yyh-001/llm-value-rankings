name: Sync Repository About

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - '.github/about.json'
      - '.github/workflows/sync-about.yml'

jobs:
  sync-about:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Sync homepage, description, and topics
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          HOMEPAGE=$(jq -r '.homepage' .github/about.json)
          DESCRIPTION=$(jq -r '.description' .github/about.json)

          gh api --method PATCH "/repos/${GITHUB_REPOSITORY}" \
            -f homepage="$HOMEPAGE" \
            -f description="$DESCRIPTION"

          jq '{names: .topics}' .github/about.json | \
            gh api --method PUT "/repos/${GITHUB_REPOSITORY}/topics" \
              --input - \
              -H "Accept: application/vnd.github.mercy-preview+json"

          echo "Repository About synced."
