name: Sync Repository About

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - '.github/about.json'
      - '.github/workflows/sync-about.yml'

permissions:
  contents: read
  administration: write

jobs:
  sync-about:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Update homepage and description
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          HOMEPAGE=$(python -c "import json; print(json.load(open('.github/about.json'))['homepage'])")
          DESCRIPTION=$(python -c "import json; print(json.load(open('.github/about.json'))['description'])")
          gh api --method PATCH "/repos/${{ github.repository }}" \
            -f homepage="$HOMEPAGE" \
            -f description="$DESCRIPTION"

      - name: Update repository topics
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          python -c "import json; json.dump({'names': json.load(open('.github/about.json'))['topics']}, open('topics.json', 'w'))"
          gh api --method PUT "/repos/${{ github.repository }}/topics" \
            --input topics.json \
            -H "Accept: application/vnd.github.mercy-preview+json"
