name: Sync Repository About

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - '.github/about.json'
      - '.github/workflows/sync-about.yml'

permissions:
  contents: read

jobs:
  sync-about:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Update homepage and description
        uses: actions/github-script@v7
        with:
          github-token: ${{ github.token }}
          script: |
            const fs = require('fs');
            const about = JSON.parse(fs.readFileSync('.github/about.json', 'utf8'));
            await github.rest.repos.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              homepage: about.homepage,
              description: about.description,
            });
            console.log('Homepage and description updated.');

      - name: Update topics
        uses: actions/github-script@v7
        with:
          github-token: ${{ github.token }}
          script: |
            const fs = require('fs');
            const about = JSON.parse(fs.readFileSync('.github/about.json', 'utf8'));
            await github.rest.repos.replaceAllTopics({
              owner: context.repo.owner,
              repo: context.repo.repo,
              names: about.topics,
            });
            console.log(`Topics updated (${about.topics.length}).`);
