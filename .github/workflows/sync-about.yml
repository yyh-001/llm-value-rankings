name: Sync Repository About

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - '.github/about.json'
      - '.github/workflows/sync-about.yml'

jobs:
  sync-about:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Sync homepage, description, and topics
        env:
          GH_TOKEN: ${{ secrets.REPO_SETTINGS_TOKEN || github.token }}
        run: |
          python3 <<'PY'
          import json, os, subprocess, sys

          with open(".github/about.json", encoding="utf-8") as f:
              about = json.load(f)

          repo = os.environ["GITHUB_REPOSITORY"]
          token = os.environ["GH_TOKEN"]
          env = {**os.environ, "GH_TOKEN": token}

          def run(args):
              result = subprocess.run(args, env=env, text=True, capture_output=True)
              if result.returncode != 0:
                  print(result.stdout)
                  print(result.stderr, file=sys.stderr)
                  sys.exit(result.returncode)

          run([
              "gh", "api", "--method", "PATCH", f"/repos/{repo}",
              "-f", f"homepage={about['homepage']}",
              "-f", f"description={about['description']}",
          ])

          with open("topics.json", "w", encoding="utf-8") as f:
              json.dump({"names": about["topics"]}, f)

          run([
              "gh", "api", "--method", "PUT", f"/repos/{repo}/topics",
              "--input", "topics.json",
              "-H", "Accept: application/vnd.github.mercy-preview+json",
          ])

          print("Repository About synced successfully.")
          PY
