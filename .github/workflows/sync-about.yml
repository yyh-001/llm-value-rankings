name: Sync Repository About

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - '.github/about.json'
      - '.github/workflows/sync-about.yml'

permissions:
  contents: read

jobs:
  sync-about:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Sync homepage, description, and topics
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.REPO_SETTINGS_TOKEN || github.token }}
          script: |
            const fs = require('fs');
            const about = JSON.parse(fs.readFileSync('.github/about.json', 'utf8'));
            const { owner, repo } = context.repo;

            await github.rest.repos.update({
              owner,
              repo,
              homepage: about.homepage,
              description: about.description,
            });

            await github.request('PUT /repos/{owner}/{repo}/topics', {
              owner,
              repo,
              names: about.topics,
              headers: {
                accept: 'application/vnd.github.mercy-preview+json',
              },
            });

            core.info('Repository About synced successfully.');
